<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tcBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8C00C8"/>
      <stop offset="50%" style="stop-color:#6B00A8"/>
      <stop offset="100%" style="stop-color:#00FFFF"/>
    </linearGradient>
    <linearGradient id="tcDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5000B4"/>
      <stop offset="100%" style="stop-color:#008C8C"/>
    </linearGradient>
    <linearGradient id="tcCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF"/>
      <stop offset="100%" style="stop-color:#008C8C"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyanglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="200" cy="160" rx="130" ry="110" fill="url(#tcBody)" opacity="0.12" filter="url(#glow)"/>

  <!-- 8 Tentacles - back layer (the "eight arms") -->
  <path d="M75 200 Q30 285, 45 355" stroke="url(#tcDark)" stroke-width="28" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M75 200 Q30 285, 45 355;M75 200 Q25 295, 40 360;M75 200 Q30 285, 45 355" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M105 212 Q65 305, 80 375" stroke="url(#tcBody)" stroke-width="26" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M105 212 Q65 305, 80 375;M105 212 Q58 315, 72 380;M105 212 Q65 305, 80 375" dur="4.5s" repeatCount="indefinite"/>
  </path>
  <path d="M295 212 Q335 305, 320 375" stroke="url(#tcBody)" stroke-width="26" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M295 212 Q335 305, 320 375;M295 212 Q342 315, 328 380;M295 212 Q335 305, 320 375" dur="4.2s" repeatCount="indefinite"/>
  </path>
  <path d="M325 200 Q370 285, 355 355" stroke="url(#tcDark)" stroke-width="28" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M325 200 Q370 285, 355 355;M325 200 Q375 295, 360 360;M325 200 Q370 285, 355 355" dur="4.8s" repeatCount="indefinite"/>
  </path>

  <!-- Tentacles - front layer -->
  <path d="M135 218 Q105 315, 120 380" stroke="url(#tcDark)" stroke-width="24" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M135 218 Q105 315, 120 380;M135 218 Q95 325, 110 385;M135 218 Q105 315, 120 380" dur="3.8s" repeatCount="indefinite"/>
  </path>
  <path d="M165 222 Q145 325, 155 390" stroke="url(#tcBody)" stroke-width="22" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M165 222 Q145 325, 155 390;M165 222 Q138 335, 148 395;M165 222 Q145 325, 155 390" dur="4.3s" repeatCount="indefinite"/>
  </path>
  <path d="M235 222 Q255 325, 245 390" stroke="url(#tcBody)" stroke-width="22" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M235 222 Q255 325, 245 390;M235 222 Q262 335, 252 395;M235 222 Q255 325, 245 390" dur="4.6s" repeatCount="indefinite"/>
  </path>
  <path d="M265 218 Q295 315, 280 380" stroke="url(#tcDark)" stroke-width="24" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <animate attributeName="d" values="M265 218 Q295 315, 280 380;M265 218 Q305 325, 290 385;M265 218 Q295 315, 280 380" dur="4.1s" repeatCount="indefinite"/>
  </path>

  <!-- Tentacle suction cups (glowing dots) -->
  <circle cx="45" cy="355" r="5" fill="#00FFFF" opacity="0.6" filter="url(#cyanglow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="375" r="4" fill="#00FFFF" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="380" r="4" fill="#8C00C8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="390" r="3" fill="#00FFFF" opacity="0.4"/>
  <circle cx="245" cy="390" r="3" fill="#00FFFF" opacity="0.4"/>
  <circle cx="280" cy="380" r="4" fill="#8C00C8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="375" r="4" fill="#00FFFF" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="355" cy="355" r="5" fill="#00FFFF" opacity="0.6" filter="url(#cyanglow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Head/Mantle -->
  <ellipse cx="200" cy="140" rx="95" ry="90" fill="url(#tcBody)" filter="url(#glow)"/>

  <!-- Inner head highlight -->
  <ellipse cx="185" cy="118" rx="55" ry="42" fill="url(#tcBody)" opacity="0.4"/>

  <!-- Eyes - dark sclera -->
  <ellipse cx="158" cy="135" rx="24" ry="28" fill="#0D1117" rx="24"/>
  <ellipse cx="242" cy="135" rx="24" ry="28" fill="#0D1117"/>

  <!-- Eyes - colored iris (cyan for TentaCLAW) -->
  <ellipse cx="161" cy="132" rx="13" ry="15" fill="#00FFFF" filter="url(#cyanglow)">
    <animate attributeName="cx" values="161;164;161" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="245" cy="132" rx="13" ry="15" fill="#00FFFF" filter="url(#cyanglow)">
    <animate attributeName="cx" values="245;242;245" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Eyes - pupils -->
  <ellipse cx="163" cy="130" rx="5" ry="7" fill="#0D1117"/>
  <ellipse cx="247" cy="130" rx="5" ry="7" fill="#0D1117"/>

  <!-- Eye shine -->
  <circle cx="156" cy="124" r="4" fill="white" opacity="0.9"/>
  <circle cx="240" cy="124" r="4" fill="white" opacity="0.9"/>
  <circle cx="168" cy="136" r="2" fill="white" opacity="0.4"/>
  <circle cx="252" cy="136" r="2" fill="white" opacity="0.4"/>

  <!-- Confident smile -->
  <path d="M165 172 Q200 200, 235 172" stroke="#0D1117" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Cheek blush (purple for TentaCLAW) -->
  <ellipse cx="135" cy="162" rx="16" ry="11" fill="#8C00C8" opacity="0.25"/>
  <ellipse cx="265" cy="162" rx="16" ry="11" fill="#8C00C8" opacity="0.25"/>

  <!-- Head spots (circuit board / neural pattern) -->
  <circle cx="170" cy="98" r="4" fill="#00FFFF" opacity="0.6"/>
  <circle cx="228" cy="103" r="3" fill="#00FFFF" opacity="0.5"/>
  <circle cx="200" cy="82" r="5" fill="#8C00C8" opacity="0.5"/>
  <circle cx="155" cy="115" r="3" fill="#00FFFF" opacity="0.3"/>
  <circle cx="245" cy="112" r="3" fill="#00FFFF" opacity="0.3"/>

  <!-- Neural crown (GPU nodes = brain nodes) -->
  <path d="M165 58 L175 40 L190 52 L200 35 L210 52 L225 40 L235 58" stroke="url(#tcCyan)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#cyanglow)"/>

  <!-- Crown glow (pulsing = cluster heartbeat) -->
  <ellipse cx="200" cy="48" rx="45" ry="18" fill="#00FFFF" opacity="0.15" filter="url(#glow)">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- GPU node indicators on tentacles -->
  <rect x="32" y="325" width="26" height="16" rx="3" fill="#0D1117" stroke="#00FFFF" stroke-width="1.5" opacity="0.8"/>
  <text x="45" y="337" fill="#00FFFF" font-size="8" font-family="monospace" text-anchor="middle" opacity="0.9">GPU</text>
  <rect x="342" y="325" width="26" height="16" rx="3" fill="#0D1117" stroke="#00FFFF" stroke-width="1.5" opacity="0.8"/>
  <text x="355" y="337" fill="#00FFFF" font-size="8" font-family="monospace" text-anchor="middle" opacity="0.9">GPU</text>
</svg>