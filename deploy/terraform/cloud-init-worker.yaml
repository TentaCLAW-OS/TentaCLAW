#cloud-config
# =============================================================================
# TentaCLAW OS -- Cloud-Init for Worker Node
# =============================================================================
#
# This cloud-init config runs on first boot of each worker server.
# It installs Node.js, Ollama (LLM inference runtime), the TentaCLAW agent,
# and node_exporter for metrics collection.
#
# Template variables (injected by Terraform):
#   ${cluster_name} -- Cluster name prefix
#   ${gateway_ip}   -- Private IP of the gateway node
#   ${worker_index} -- This worker's index (1-based)
#   ${worker_name}  -- This worker's hostname
# =============================================================================

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - jq
  - htop
  - ufw
  - fail2ban
  - pciutils
  - lm-sensors

runcmd:
  # -------------------------------------------------------------------------
  # System setup
  # -------------------------------------------------------------------------
  - echo "=== TentaCLAW Worker ${worker_name} cloud-init starting ==="

  # Set hostname
  - hostnamectl set-hostname ${worker_name}

  # Configure fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # -------------------------------------------------------------------------
  # Node.js 22.x
  # -------------------------------------------------------------------------
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs

  # -------------------------------------------------------------------------
  # Ollama (LLM inference runtime)
  # -------------------------------------------------------------------------
  - |
    curl -fsSL https://ollama.com/install.sh | sh

    # Configure Ollama to listen on all interfaces (for gateway proxy access)
    mkdir -p /etc/systemd/system/ollama.service.d
    cat > /etc/systemd/system/ollama.service.d/override.conf << 'OV'
    [Service]
    Environment="OLLAMA_HOST=0.0.0.0:11434"
    Environment="OLLAMA_ORIGINS=*"
    OV

    systemctl daemon-reload
    systemctl enable ollama
    systemctl restart ollama

    # Wait for Ollama to be ready, then pull a small default model
    sleep 5
    ollama pull qwen2.5:1.5b || true

  # -------------------------------------------------------------------------
  # GPU driver detection and installation
  # -------------------------------------------------------------------------
  - |
    # Detect NVIDIA GPUs
    if lspci | grep -qi nvidia; then
      echo "[gpu] NVIDIA GPU detected, installing drivers..."
      apt-get install -y ubuntu-drivers-common
      ubuntu-drivers autoinstall || true

      # Install NVIDIA Container Toolkit for potential future Docker use
      curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
        gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
        sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
        tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      apt-get update
      apt-get install -y nvidia-container-toolkit || true
    fi

    # Detect AMD GPUs
    if lspci | grep -qi "amd.*display\|amd.*vga\|radeon"; then
      echo "[gpu] AMD GPU detected, installing ROCm..."
      wget https://repo.radeon.com/amdgpu-install/latest/ubuntu/noble/amdgpu-install_6.0.60000-1_all.deb -O /tmp/amdgpu-install.deb || true
      apt-get install -y /tmp/amdgpu-install.deb || true
      amdgpu-install -y --usecase=rocm || true
    fi

  # -------------------------------------------------------------------------
  # Clone and build TentaCLAW agent
  # -------------------------------------------------------------------------
  - |
    cd /opt
    git clone https://github.com/TentaCLAW-OS/tentaclaw-os.git
    cd tentaclaw-os

    # Build agent
    cd agent
    npm ci --omit=dev
    npm run build
    cd ..

  # -------------------------------------------------------------------------
  # TentaCLAW rig.conf (agent configuration)
  # -------------------------------------------------------------------------
  - |
    mkdir -p /etc/tentaclaw
    cat > /etc/tentaclaw/rig.conf << 'CONF'
    # TentaCLAW Agent Configuration
    # Auto-generated by Terraform cloud-init
    NODE_ID=${worker_name}
    NODE_HOSTNAME=${worker_name}
    FARM_HASH=${cluster_name}
    GATEWAY_URL=http://${gateway_ip}:8080
    AGENT_INTERVAL=10
    WATCHDOG_ENABLED=1
    WATCHDOG_GPU_TEMP_MAX=85
    WATCHDOG_ACTION=throttle
    CONF

  # -------------------------------------------------------------------------
  # Systemd service for agent
  # -------------------------------------------------------------------------
  - |
    cat > /etc/systemd/system/tentaclaw-agent.service << 'UNIT'
    [Unit]
    Description=TentaCLAW Agent - GPU Inference Node Daemon
    Documentation=https://github.com/TentaCLAW-OS/tentaclaw-os
    After=network-online.target ollama.service
    Wants=network-online.target ollama.service

    [Service]
    Type=simple
    User=root
    WorkingDirectory=/opt/tentaclaw-os/agent
    ExecStart=/usr/bin/node dist/index.js
    Restart=always
    RestartSec=5
    StandardOutput=journal
    StandardError=journal
    SyslogIdentifier=tentaclaw-agent

    # Environment
    Environment=TENTACLAW_GATEWAY_URL=http://${gateway_ip}:8080
    Environment=TENTACLAW_NODE_ID=${worker_name}
    Environment=TENTACLAW_HOSTNAME=${worker_name}
    Environment=TENTACLAW_FARM_HASH=${cluster_name}

    # Hardening
    NoNewPrivileges=true
    ProtectHome=true
    PrivateTmp=true

    [Install]
    WantedBy=multi-user.target
    UNIT

    systemctl daemon-reload
    systemctl enable tentaclaw-agent
    systemctl start tentaclaw-agent

  # -------------------------------------------------------------------------
  # Node exporter (metrics for Prometheus)
  # -------------------------------------------------------------------------
  - |
    useradd --no-create-home --shell /bin/false node_exporter || true
    wget -q https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz -O /tmp/node_exporter.tar.gz
    tar xzf /tmp/node_exporter.tar.gz -C /tmp
    cp /tmp/node_exporter-1.7.0.linux-amd64/node_exporter /usr/local/bin/
    rm -rf /tmp/node_exporter*

    cat > /etc/systemd/system/node_exporter.service << 'NE'
    [Unit]
    Description=Prometheus Node Exporter
    After=network-online.target

    [Service]
    User=node_exporter
    ExecStart=/usr/local/bin/node_exporter
    Restart=always

    [Install]
    WantedBy=multi-user.target
    NE

    systemctl daemon-reload
    systemctl enable node_exporter
    systemctl start node_exporter

  # -------------------------------------------------------------------------
  # NVIDIA GPU exporter (if NVIDIA GPU present)
  # -------------------------------------------------------------------------
  - |
    if command -v nvidia-smi &> /dev/null; then
      echo "[metrics] NVIDIA GPU detected, installing DCGM exporter..."
      # DCGM exporter runs on port 9400
      docker pull nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.1-ubuntu22.04 2>/dev/null || true
    fi

  - echo "=== TentaCLAW Worker ${worker_name} cloud-init complete ==="

# Write configuration files
write_files:
  - path: /etc/tentaclaw/cluster.conf
    permissions: '0644'
    content: |
      # TentaCLAW Cluster Configuration
      # Auto-generated by Terraform cloud-init
      CLUSTER_NAME=${cluster_name}
      ROLE=worker
      WORKER_INDEX=${worker_index}
      GATEWAY_IP=${gateway_ip}

  - path: /etc/motd
    permissions: '0644'
    content: |
      ============================================================
        TentaCLAW OS -- Worker Node
        Name:    ${worker_name}
        Cluster: ${cluster_name}
        Gateway: http://${gateway_ip}:8080

        Agent logs:  journalctl -u tentaclaw-agent -f
        Ollama logs: journalctl -u ollama -f
        GPU status:  nvidia-smi (if NVIDIA)
      ============================================================

final_message: "TentaCLAW Worker ${worker_name} ready in $UPTIME seconds"
