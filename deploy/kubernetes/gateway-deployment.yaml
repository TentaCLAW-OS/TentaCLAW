apiVersion: apps/v1
kind: Deployment
metadata:
  name: tentaclaw-gateway
  namespace: tentaclaw
  labels:
    app.kubernetes.io/name: tentaclaw-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: tentaclaw
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tentaclaw-gateway
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tentaclaw-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: tentaclaw
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: tentaclaw-gateway
      terminationGracePeriodSeconds: 30

      # Spread replicas across nodes for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: tentaclaw-gateway
                    app.kubernetes.io/component: gateway
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: gateway
          image: ghcr.io/tentaclaw-os/gateway:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Environment: config from ConfigMap
          envFrom:
            - configMapRef:
                name: tentaclaw-gateway-config
          env:
            - name: TENTACLAW_CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: tentaclaw-secrets
                  key: TENTACLAW_CLUSTER_SECRET
            - name: TENTACLAW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tentaclaw-secrets
                  key: TENTACLAW_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tentaclaw-secrets
                  key: DATABASE_URL
                  optional: true

          # Resource limits
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi

          # Liveness — is the process alive?
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness — can it serve traffic?
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup — give the app time to initialize
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

          # SQLite data volume
          volumeMounts:
            - name: data
              mountPath: /app/gateway/data

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tentaclaw-gateway-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tentaclaw-gateway-data
  namespace: tentaclaw
  labels:
    app.kubernetes.io/name: tentaclaw-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: tentaclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: "" # Uncomment and set for a specific storage class
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tentaclaw-gateway
  namespace: tentaclaw
  labels:
    app.kubernetes.io/name: tentaclaw-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: tentaclaw
