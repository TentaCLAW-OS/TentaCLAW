apiVersion: v1
kind: Secret
metadata:
  name: tentaclaw-secrets
  namespace: tentaclaw
  labels:
    app.kubernetes.io/name: tentaclaw
    app.kubernetes.io/part-of: tentaclaw
type: Opaque
stringData:
  # IMPORTANT: Replace these values before applying to a real cluster.
  # Use `kubectl create secret` or a secrets manager (Vault, Sealed Secrets, etc.)
  # in production. Never commit real credentials to version control.

  # Shared cluster secret — agents authenticate with this token
  TENTACLAW_CLUSTER_SECRET: "CHANGE-ME-generate-with-openssl-rand-hex-32"

  # API key for external clients calling the gateway
  TENTACLAW_API_KEY: "CHANGE-ME-generate-with-openssl-rand-hex-32"

  # PostgreSQL connection string (optional — leave empty to use SQLite)
  # When empty, gateway uses local SQLite in the persistent volume.
  DATABASE_URL: ""
