---
# =============================================================================
# TentaCLAW OS -- node_exporter Installation Task
# =============================================================================

- name: Check if node_exporter is installed
  stat:
    path: /usr/local/bin/node_exporter
  register: ne_binary

- name: Create node_exporter user
  user:
    name: node_exporter
    shell: /bin/false
    create_home: false
    system: true
  when: not ne_binary.stat.exists

- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"
  when: not ne_binary.stat.exists

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: true
  when: not ne_binary.stat.exists

- name: Install node_exporter binary
  copy:
    src: /tmp/node_exporter-1.7.0.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    remote_src: true
    mode: "0755"
    owner: root
    group: root
  when: not ne_binary.stat.exists

- name: Clean up node_exporter download
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/node_exporter.tar.gz
    - /tmp/node_exporter-1.7.0.linux-amd64
  when: not ne_binary.stat.exists

- name: Install node_exporter systemd service
  copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  notify:
    - reload systemd for node_exporter
    - restart node_exporter

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true

handlers:
  - name: reload systemd for node_exporter
    systemd:
      daemon_reload: true

  - name: restart node_exporter
    systemd:
      name: node_exporter
      state: restarted
