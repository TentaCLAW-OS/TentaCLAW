# =============================================================================
# TentaCLAW OS -- Ansible Inventory
# =============================================================================
#
# Copy this file and fill in your server IPs:
#   cp inventory.example.ini inventory.ini
#   vim inventory.ini
#
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml
#
# CLAWtopus says: "Know your nodes. Name your arms."
# =============================================================================

# -----------------------------------------------------------------------------
# Gateway Node (1 required)
# -----------------------------------------------------------------------------
# The central coordinator: API, dashboard, database, monitoring.
# Does not need a GPU -- a small VPS is fine.

[gateway]
gateway-01 ansible_host=203.0.113.10 ansible_user=root

# -----------------------------------------------------------------------------
# Worker Nodes (1+ required)
# -----------------------------------------------------------------------------
# Each worker runs the TentaCLAW agent + Ollama for inference.
# These should have GPUs (NVIDIA or AMD) for best performance.

[workers]
worker-01 ansible_host=203.0.113.20 ansible_user=root worker_name=gpu-rig-01
worker-02 ansible_host=203.0.113.21 ansible_user=root worker_name=gpu-rig-02
worker-03 ansible_host=203.0.113.22 ansible_user=root worker_name=gpu-rig-03

# Add more workers as needed:
# worker-04 ansible_host=203.0.113.23 ansible_user=root worker_name=gpu-rig-04
# worker-05 ansible_host=203.0.113.24 ansible_user=root worker_name=gpu-rig-05

# -----------------------------------------------------------------------------
# Group Variables
# -----------------------------------------------------------------------------

[all:vars]
# Connection
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# TentaCLAW configuration
tentaclaw_repo=https://github.com/TentaCLAW-OS/tentaclaw-os.git
tentaclaw_branch=master
tentaclaw_install_dir=/opt/tentaclaw-os

# Node.js version
node_version=22

[gateway:vars]
# Gateway-specific settings
tentaclaw_port=8080
tentaclaw_host=0.0.0.0
tentaclaw_db=sqlite
# Uncomment for PostgreSQL:
# tentaclaw_db=postgres
# tentaclaw_pg_url=postgres://tentaclaw:changeme@127.0.0.1:5432/tentaclaw

[workers:vars]
# Worker-specific settings
# The gateway URL that agents connect to (use private IP if on same network)
gateway_url=http://203.0.113.10:8080
agent_interval=10
ollama_host=0.0.0.0:11434
