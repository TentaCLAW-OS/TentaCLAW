{{/*
=============================================================================
Gateway Deployment
Manages the central TentaCLAW API server and cluster orchestrator.
=============================================================================
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tentaclaw.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tentaclaw.gateway.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  revisionHistoryLimit: 5
  {{- with .Values.gateway.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tentaclaw.gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tentaclaw.gateway.labels" . | nindent 8 }}
      annotations:
        # Force rolling restart when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.gateway.port | quote }}
        prometheus.io/path: "/metrics"
        {{- with .Values.gateway.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "tentaclaw.gateway.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      {{- include "tentaclaw.imagePullSecrets" . | nindent 6 }}

      {{- /* Pod anti-affinity: spread replicas across nodes */}}
      {{- if gt (int .Values.gateway.antiAffinityWeight) 0 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.gateway.antiAffinityWeight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "tentaclaw.gateway.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}

      {{- with .Values.gateway.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: gateway
          image: {{ .Values.gateway.image }}
          imagePullPolicy: {{ .Values.gateway.imagePullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP

          # ---- Environment ----
          envFrom:
            - configMapRef:
                name: {{ include "tentaclaw.fullname" . }}-gateway-config
          env:
            {{- /* Extra user-supplied env vars */}}
            {{- range $key, $value := .Values.gateway.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Secrets injected from the Secret resource
            - name: TENTACLAW_CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentaclaw.secretName" . }}
                  key: TENTACLAW_CLUSTER_SECRET
            - name: TENTACLAW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentaclaw.secretName" . }}
                  key: TENTACLAW_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentaclaw.secretName" . }}
                  key: DATABASE_URL
                  optional: true

          # ---- Resources ----
          {{- with .Values.gateway.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # ---- Health Checks ----
          {{- with .Values.gateway.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.gateway.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.gateway.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # ---- Volumes ----
          {{- if .Values.gateway.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /app/gateway/data
          {{- end }}

          {{- with .Values.gateway.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      {{- if .Values.gateway.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tentaclaw.fullname" . }}-gateway-data
      {{- end }}

{{- /* ---- PersistentVolumeClaim ---- */}}
{{- if .Values.gateway.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tentaclaw.fullname" . }}-gateway-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tentaclaw.gateway.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.gateway.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.gateway.persistence.size }}
  {{- if .Values.gateway.persistence.storageClass }}
  storageClassName: {{ .Values.gateway.persistence.storageClass | quote }}
  {{- end }}
{{- end }}

{{- /* ---- ServiceAccount ---- */}}
{{- if .Values.gateway.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tentaclaw.gateway.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tentaclaw.gateway.labels" . | nindent 4 }}
  {{- with .Values.gateway.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
