# =============================================================================
# TentaCLAW OS -- Grafana Dashboard Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: "TentaCLAW"
    orgId: 1
    folder: "TentaCLAW"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
