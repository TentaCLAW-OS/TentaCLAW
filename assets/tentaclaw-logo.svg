<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="body" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a2a22"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mantle / head -->
  <ellipse cx="32" cy="22" rx="16" ry="14" fill="url(#body)" filter="url(#glow)"/>
  <!-- Head border -->
  <ellipse cx="32" cy="22" rx="16" ry="14" stroke="url(#grad)" stroke-width="1.2" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="26" cy="19" rx="4" ry="4.5" fill="#0d1117" stroke="url(#grad)" stroke-width="0.8"/>
  <ellipse cx="38" cy="19" rx="4" ry="4.5" fill="#0d1117" stroke="url(#grad)" stroke-width="0.8"/>
  <!-- Pupils -->
  <ellipse cx="26" cy="19.5" rx="2" ry="2.5" fill="url(#grad)"/>
  <ellipse cx="38" cy="19.5" rx="2" ry="2.5" fill="url(#grad)"/>
  <!-- Eye shine -->
  <circle cx="25" cy="18" r="0.9" fill="white" opacity="0.85"/>
  <circle cx="37" cy="18" r="0.9" fill="white" opacity="0.85"/>

  <!-- Smile -->
  <path d="M27 25 Q32 29 37 25" stroke="url(#grad)" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- Tentacles — 8 of them, curling outward -->
  <!-- Left outer -->
  <path d="M18 32 C12 36 8 42 10 50 C11 54 14 55 13 58" stroke="url(#grad)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Left mid-outer -->
  <path d="M22 35 C18 40 16 47 18 53 C19 57 22 57 21 60" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Left mid -->
  <path d="M26 36 C24 42 23 49 25 54 C26 58 28 58 28 62" stroke="url(#grad)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Left inner -->
  <path d="M30 36 C29 43 29 50 30 55 C31 59 32 60 32 63" stroke="url(#grad2)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Right inner -->
  <path d="M34 36 C35 43 35 50 34 55 C33 59 32 60 32 63" stroke="url(#grad)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Right mid -->
  <path d="M38 36 C40 42 41 49 39 54 C38 58 36 58 36 62" stroke="url(#grad2)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Right mid-outer -->
  <path d="M42 35 C46 40 48 47 46 53 C45 57 42 57 43 60" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right outer -->
  <path d="M46 32 C52 36 56 42 54 50 C53 54 50 55 51 58" stroke="url(#grad2)" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Sucker dots on a few tentacles -->
  <circle cx="11" cy="46" r="1" fill="url(#grad)" opacity="0.6"/>
  <circle cx="10.5" cy="52" r="0.8" fill="url(#grad)" opacity="0.5"/>
  <circle cx="53" cy="46" r="1" fill="url(#grad2)" opacity="0.6"/>
  <circle cx="53.5" cy="52" r="0.8" fill="url(#grad2)" opacity="0.5"/>
</svg>
