<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        body { font-family: monospace; text-align: center; }
        canvas { border: 1px solid black; }
        .controls { margin: 20px 0; font-size: 16px; }
    </style>
</head>
<body>
    <p>Score: <span id="score">0</span></p>
    <p>Level: <span id="level">1</span></p>
    <p class="controls">A/S/D/F for pieces, Arrow keys for movement, Down for soft drop, Space for hard drop, P for pause</p>
    <canvas id="tetris" width="300" height="600"></canvas>
    <script>
        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');

        const colors = ['blue', 'yellow', 'purple', 'cyan', 'red', 'orange', 'green'];
        const pieces = [
            [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 2, y: 0 }, { x: 3, y: 0 }],
            [{ x: 1, y: 0 }, { x: 0, y: 1 }, { x: 1, y: 1 }, { x: 2, y: 1 }, { x: 1, y: 2 }],
            [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 2, y: 1 }, { x: 2, y: 2 }],
            [{ x: 0, y: 0 }, { x: 0, y: 1 }, { x: 1, y: 1 }, { x: 2, y: 1 }],
            [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: -1 }, { x: 2, y: -1 }],
            [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: -1 }, { x: -1, y: -1 }],
            [{ x: 0, y: 0 }, { x: 0, y: -1 }, { x: 1, y: -1 }, { x: 1, y: -2 }]
        ];

        const board = [];
        for (let y = 0; y < 20; y++)
            for (let x = 0; x < 10; x++)
                board.push({ x, y });

        let tetromino = pieces[0].map(({ x, y }) => ({ x, y }));
        let tetrominoX = 4;
        let tetrominoY = 0;
        let speed = 1000;
        let score = 0;
        let level = 1;

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, 300, 600);
            ctx.fillStyle = 'light-grey';
            ctx.fillRect(300, 0, 10, 600);
            ctx.fillStyle = 'grey';
            ctx.fillRect(10, 0, 290, 20);
            for (let i = 0; i < board.length; i++) {
                let b = board[i];
                if (b)
                    ctx.fillStyle = colors[b.index % colors.length];
                ctx.fillRect(b.x * 20, b.y * 20, 20, 20);
            }
            ctx.fillStyle = 'white';
            ctx.fillText('Score: ' + score, 10, 15);
            ctx.fillText('Level: ' + level, 10, 35);
            for (let i = 0; i < tetromino.length; i++) {
                ctx.fillStyle = colors[tetromino[i].index % colors.length];
                ctx.fillRect((tetromino[i].x * 20) + 300, (tetromino[i].y * 20), 20, 20);
            }
        }

        function rotate() {
            let o = (tetromino[0].y - tetromino[1].y) * 20;
            for (let i = 0; i < tetromino.length; i++) {
                let { x: x1, y: y1 } = tetromino[i];
                tetromino[i] = { x: y1 + o, y: -x1 };
            }
        }

        function pause() {
            pauseButton = setInterval(() => {
                for (let i = 0; i < tetromino.length; i++) {
                    tetromino[i].y += 1;
                    if (tetromino[i].y >= 20) {
                        board.push(tetromino[i]);
                        tetromino = pieces[Math.floor(Math.random() * 7)].map(({ x, y }) => ({ x, y }));
                        tetrominoY = 0;
                        tetrominoX = 4;
                        for (let i = 0; i < tetromino.length; i++) {
                            let b = tetromino[i];
                            if (board[b.y * 10 + b.x]) {
                                draw();
                                board = [];
                                for (let y = 0; y < 20; y++)
                                    for (let x = 0; x < 10; x++) {
                                        let tile = { x, y };
                                        board.push(tile);
                                    }
                                setTimeout(() => {
                                    alert("GAME OVER");
                                }, 500);
                                return;
                            }
                        }
                    }
                }
                if (tetrominoY % 20 === 0)
                    draw();
                tetrominoY += 1;
            }, speed - (level * 100));
        }

        document.addEventListener('keydown', event => {
            switch (event.key) {
                case 'ArrowLeft': tetrominoX -= 1; break;
                case 'ArrowRight': tetrominoX += 1; break;
                case 'ArrowDown': tetrominoY += 1; break;
                case 'ArrowUp': rotate(); break;
                case 'p': case 'P': pause(); break;
                case ' ': tetrominoY = 20; break;
                case 'f': case 'F': speed = 100; break;
                case 's': case 'S': speed = 1000; break;
                case 'a': case 'A': speed = 500; break;
                case 'd': case 'D': speed = 200; break;
                case '0': case 'z': case 'Z': speed = 1000; pause(); break;
                case 'e': case 'E': speed = 1000; pause(); break;
                default: break;
            }
        });

        let lastTime = 0;
        function mainLoop(time) {
            if (time < lastTime + 16) return;
            lastTime = time;
            window.requestAnimationFrame(mainLoop);
            draw();
            if (tetrominoY && !tetrominoX || !tetrominoY) return;
            for (let i = 0; i < tetromino.length; i++) {
                let b = tetromino[i];
                if (board[b.y * 10 + b.x]) return;
            }
            tetrominoY += 1;
            tetromino = pieces[Math.floor(Math.random() * 7)].map(({ x, y }) => ({ x, y }));
            tetrominoY = 0;
            tetrominoX = 4;
        }
        mainLoop(Date.now());

        function removeFullLines() {
            let remove = [];
            for (let y = 0; y < 20; y++) {
                let lineEmpty = false;
                for (let x = 0; x < 10; x++) {
                    if (!board[y * 10 + x]) {
                        lineEmpty = true;
                        break;
                    }
                }
                if (!lineEmpty) remove.push(y);
                if (remove.length > 0) {
                    for (let y2 of remove.reverse()) {
                        for (let x = 0; x < 10; x++) {
                            let b = board[y2 * 10 + x];
                            if (b)
                                b.y -= 1;
                        }
                    }
                }
                remove.length = 0;
                score += 10;
            }
        }

        window.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowDown': pause(); break;
                default: break;
            }
        });

        function gameOver() {
            let restart = confirm("Press Enter to restart.");
            if (restart) {
                location.reload();
            }
        }
    </script>
</body>
</html>
