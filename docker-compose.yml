version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - gateway-data:/app/gateway/data
    environment:
      - TENTACLAW_PORT=8080
      - TENTACLAW_HOST=0.0.0.0
    restart: unless-stopped

volumes:
  gateway-data:
