name: "@tentaclaw/gemma3-4b-flight"
version: "1.0.0"
type: model
title: "Gemma 3 4B — Edge Deployment"
description: "Flight sheet for Google Gemma 3 4B on edge and low-VRAM hardware (4GB+)"
license: MIT

author:
  name: TentaCLAW Team
publisher: tentaclaw

categories:
  - flight-sheets
tags:
  - gemma
  - google
  - 4b
  - edge
  - lightweight

model:
  type: flight-sheet
  base_model: "gemma3"
  variant: "4b-instruct"
  quantization: "Q4_K_M"
  format: gguf
  hardware:
    minimum_vram: "3GB"
    recommended_vram: "4GB"
    compatible_gpus:
      - "RTX 3050 6GB"
      - "GTX 1650 4GB"
      - "RTX 4060 8GB"
      - "Intel Arc A580 8GB"
      - "RX 6500 XT 4GB"
      - "Apple M1 8GB (unified)"
  parameters:
    context_length: 8192
    batch_size: 256
    gpu_layers: 28
    threads: 4
    mlock: true
    mmap: true
  benchmarks:
    tokens_per_second: 80
    time_to_first_token: 0.1
    hardware_tested: "RTX 3050 6GB"
