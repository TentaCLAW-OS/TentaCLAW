name: "@tentaclaw/deepseek-v3-flight"
version: "1.0.0"
type: model
title: "DeepSeek V3 — 671B MoE Deployment"
description: "Flight sheet for DeepSeek V3 671B MoE on multi-GPU clusters (80GB+ total VRAM)"
license: MIT

author:
  name: TentaCLAW Team
publisher: tentaclaw

categories:
  - flight-sheets
tags:
  - deepseek
  - 671b
  - moe
  - reasoning
  - datacenter

model:
  type: flight-sheet
  base_model: "deepseek-v3"
  variant: "671b-moe-instruct"
  quantization: "Q4_K_M"
  format: gguf
  hardware:
    minimum_vram: "80GB"
    recommended_vram: "160GB"
    compatible_gpus:
      - "2x A100 80GB"
      - "2x H100 80GB"
      - "4x RTX 4090 24GB"
      - "4x RTX 5090 32GB"
  parameters:
    context_length: 65536
    batch_size: 2048
    gpu_layers: 96
    threads: 32
    mlock: true
    mmap: true
  benchmarks:
    tokens_per_second: 8
    time_to_first_token: 3.2
    hardware_tested: "2x A100 80GB (NVLink)"
