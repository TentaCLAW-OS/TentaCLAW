      - "2x RTX 4090 24GB"
      - "2x RTX 3090 24GB"
      - "1x A100 80GB"
  parameters:
    context_length: 32768
    batch_size: 256
    gpu_layers: 80
    flash_attention: true
  benchmarks:
    tokens_per_second: 22
    time_to_first_token: 1.0
