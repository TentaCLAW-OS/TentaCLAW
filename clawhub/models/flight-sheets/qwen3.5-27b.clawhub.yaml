name: "@tentaclaw/qwen3.5-27b-flight"
version: "1.0.0"
type: model
title: "Qwen 3.5 27B — Mid-Range Deployment"
description: "Flight sheet for Alibaba Qwen 3.5 27B on mid-range GPUs (16GB+ VRAM)"
license: MIT

author:
  name: TentaCLAW Team
publisher: tentaclaw

categories:
  - flight-sheets
tags:
  - qwen
  - 27b
  - multilingual
  - reasoning
  - mid-range

model:
  type: flight-sheet
  base_model: "qwen3.5"
  variant: "27b-instruct"
  quantization: "Q4_K_M"
  format: gguf
  hardware:
    minimum_vram: "16GB"
    recommended_vram: "24GB"
    compatible_gpus:
      - "RTX 4070 Ti 16GB"
      - "RTX 4080 16GB"
      - "RTX 4090 24GB"
      - "RTX 5070 Ti 16GB"
      - "RTX 5080 16GB"
      - "RX 7900 XTX 24GB"
  parameters:
    context_length: 32768
    batch_size: 512
    gpu_layers: 48
    threads: 8
    mlock: true
    mmap: true
  benchmarks:
    tokens_per_second: 25
    time_to_first_token: 0.6
    hardware_tested: "RTX 4090 24GB"
