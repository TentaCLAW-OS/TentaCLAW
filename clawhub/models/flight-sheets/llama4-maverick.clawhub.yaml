name: "@tentaclaw/llama4-maverick-flight"
version: "1.0.0"
type: model
title: "Llama 4 Maverick — 400B MoE Deployment"
description: "Flight sheet for Meta Llama 4 Maverick 400B MoE on multi-GPU setups (48GB+ total)"
license: MIT

author:
  name: TentaCLAW Team
publisher: tentaclaw

categories:
  - flight-sheets
tags:
  - llama
  - llama4
  - maverick
  - 400b
  - moe

model:
  type: flight-sheet
  base_model: "llama4"
  variant: "maverick-400b-instruct"
  quantization: "Q4_K_M"
  format: gguf
  hardware:
    minimum_vram: "48GB"
    recommended_vram: "80GB"
    compatible_gpus:
      - "2x RTX 4090 24GB"
      - "A6000 48GB"
      - "A100 80GB"
      - "H100 80GB"
      - "2x RTX 5090 32GB"
  parameters:
    context_length: 65536
    batch_size: 1024
    gpu_layers: 64
    threads: 16
    mlock: true
    mmap: true
  benchmarks:
    tokens_per_second: 15
    time_to_first_token: 1.5
    hardware_tested: "2x RTX 4090 24GB (NVLink)"
