name: "@tentaclaw/qwen3.5-9b-flight"
version: "1.0.0"
type: model
title: "Qwen 3.5 9B — Standard Deployment"
description: "Flight sheet for Alibaba Qwen 3.5 9B on consumer GPUs (8GB+ VRAM)"
license: MIT

author:
  name: TentaCLAW Team
publisher: tentaclaw

categories:
  - flight-sheets
tags:
  - qwen
  - 9b
  - multilingual
  - general-purpose
  - consumer-gpu

model:
  type: flight-sheet
  base_model: "qwen3.5"
  variant: "9b-instruct"
  quantization: "Q4_K_M"
  format: gguf
  hardware:
    minimum_vram: "6GB"
