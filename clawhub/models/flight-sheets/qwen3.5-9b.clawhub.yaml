      - "RTX 3060 12GB"
      - "RTX 3070 8GB"
      - "RTX 4060 8GB"
      - "RTX 4070 Ti 16GB"
      - "RTX 4090 24GB"
      - "RX 7800 XT 16GB"
  parameters:
    context_length: 32768
    batch_size: 512
    gpu_layers: 33
    threads: 8
    mlock: true
    mmap: true
  benchmarks:
    tokens_per_second: 48
    time_to_first_token: 0.25
    hardware_tested: "RTX 4070 Ti Super 16GB"
