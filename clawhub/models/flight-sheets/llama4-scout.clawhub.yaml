name: "@tentaclaw/llama4-scout-flight"
version: "1.0.0"
type: model
title: "Llama 4 Scout — 10M Context Deployment"
description: "Flight sheet for Meta Llama 4 Scout with 10M token context on high-VRAM GPUs (24GB+)"
license: MIT

author:
  name: TentaCLAW Team
publisher: tentaclaw

categories:
  - flight-sheets
tags:
  - llama
  - llama4
  - scout
  - long-context
  - moe

model:
  type: flight-sheet
  base_model: "llama4"
  variant: "scout-instruct"
  quantization: "Q4_K_M"
  format: gguf
  hardware:
    minimum_vram: "24GB"
    recommended_vram: "48GB"
    compatible_gpus:
      - "RTX 4090 24GB"
      - "RTX 5090 32GB"
      - "A6000 48GB"
      - "A100 80GB"
      - "H100 80GB"
  parameters:
    context_length: 131072
    batch_size: 2048
    gpu_layers: 48
    threads: 16
    mlock: true
    mmap: true
  benchmarks:
    tokens_per_second: 28
    time_to_first_token: 0.8
    hardware_tested: "RTX 4090 24GB"
