name: "@tentaclaw/nomic-embed-flight"
version: "1.0.0"
type: model
title: "Nomic Embed Text — Embedding Deployment"
description: "Flight sheet for Nomic Embed Text v1.5 embedding model on any GPU (2GB+)"
license: MIT

author:
  name: TentaCLAW Team
publisher: tentaclaw

categories:
  - flight-sheets
tags:
  - nomic
  - embedding
  - vector
  - rag
  - semantic-search

model:
  type: flight-sheet
  base_model: "nomic-embed-text"
  variant: "v1.5"
  quantization: "f16"
  format: gguf
  hardware:
    minimum_vram: "2GB"
    recommended_vram: "4GB"
    compatible_gpus:
      - "Any GPU with 2GB+ VRAM"
      - "GTX 1050 Ti 4GB"
      - "RTX 3050 6GB"
      - "Intel Arc A380 6GB"
      - "Apple M1 8GB (unified)"
  parameters:
    context_length: 8192
    batch_size: 256
    gpu_layers: 24
    threads: 4
    mlock: true
    mmap: true
  benchmarks:
    tokens_per_second: 500
    time_to_first_token: 0.05
    hardware_tested: "RTX 3060 12GB"
