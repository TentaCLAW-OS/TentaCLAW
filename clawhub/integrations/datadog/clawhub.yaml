name: "@tentaclaw/datadog-integration"
version: "1.0.0"
type: integration
title: "Datadog Metrics Export"
description: "Export TentaCLAW cluster metrics and inference stats to Datadog for monitoring dashboards."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories:
  - monitoring
tags:
  - datadog
  - metrics
  - monitoring
  - observability
  - dashboards
integration:
  protocol: rest
  service: datadog
  entry: ./src/index.ts
  transport: http
  tools:
    - name: export-metrics
      description: "Push cluster metrics to Datadog"
    - name: create-dashboard
      description: "Generate a Datadog dashboard for cluster monitoring"
    - name: set-alert
      description: "Configure metric-based alerts"
    - name: query
      description: "Query Datadog metrics with natural language"
  auth:
    type: api-key
    config_key: DATADOG_API_KEY
