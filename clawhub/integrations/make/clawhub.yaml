name: "@tentaclaw/make-integration"
version: "1.0.0"
type: integration
title: "Make.com (Integromat) Integration"
description: "Connect TentaCLAW to Make.com scenarios. Trigger automations from AI inference events."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories:
  - automation
tags:
  - make
  - integromat
  - automation
  - workflow
  - no-code
integration:
  protocol: rest
  service: make
  entry: ./src/index.ts
  transport: webhook
  tools:
    - name: trigger
      description: "Trigger a Make.com scenario via webhook"
    - name: list-scenarios
      description: "List connected scenarios"
    - name: run
      description: "Manually run a scenario"
    - name: logs
      description: "View scenario execution history"
  auth:
    type: api-key
    config_key: MAKE_WEBHOOK_SECRET
