name: "@tentaclaw/uptime-kuma-integration"
version: "1.0.0"
type: integration
title: "Uptime Kuma Monitoring"
description: "Monitor TentaCLAW node health via Uptime Kuma. Push status and receive downtime alerts."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories:
  - monitoring
tags:
  - uptime-kuma
  - monitoring
  - health-check
  - self-hosted
  - alerts
integration:
  protocol: rest
  service: uptime-kuma
  entry: ./src/index.ts
  transport: http
  tools:
    - name: push
      description: "Push heartbeat status to Uptime Kuma"
    - name: monitors
      description: "List all configured monitors"
    - name: status
      description: "Get current uptime status for all nodes"
    - name: alerts
      description: "View recent downtime alerts"
  auth:
    type: api-key
    config_key: UPTIME_KUMA_API_KEY
