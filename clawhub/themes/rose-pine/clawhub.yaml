    secondary: { type: color, default: "#ebbcba" }
    text: { type: color, default: "#e0def4" }
    dim: { type: color, default: "#6e6a86" }
    success: { type: color, default: "#31748f" }
    warning: { type: color, default: "#f6c177" }
    danger: { type: color, default: "#eb6f92" }
