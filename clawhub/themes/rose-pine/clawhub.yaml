name: "@tentaclaw/rose-pine"
version: "1.0.0"
type: theme
title: "Rose Pine — Soho Vibes"
description: "Muted rose and pine tones. Elegant and understated."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories: [full-themes]
tags: [dark, rose, pine, elegant, muted]
theme:
  type: full-theme
  framework: static
  entry: ./css/rose-pine.css
  preview: ./preview.png
  variables:
    background: { type: color, default: "#191724" }
    surface: { type: color, default: "#1f1d2e" }
    panel: { type: color, default: "#26233a" }
