type: theme
title: "Nord — Arctic Frost"
description: "Cool blues and muted tones. Clean, calm, professional."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories: [full-themes]
tags: [dark, nord, blue, arctic, professional]
theme:
  type: full-theme
  framework: static
  entry: ./css/nord.css
  preview: ./preview.png
