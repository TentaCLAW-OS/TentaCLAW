name: "@tentaclaw/skill-port-scanner"
version: "1.0.0"
type: skill
title: "Port Scanner Skill"
description: "Scan network ports. Supports TCP/UDP scanning, service detection, and common port range presets."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories:
  - system
tags:
  - network
  - port-scan
  - security
  - diagnostics
skill:
  entry: ./src/index.ts
  runtime: typescript
  transport: stdio
  capabilities:
    - scan-ports
    - detect-services
    - check-port
  permissions:
    - network
  config_schema:
    default_host:
      type: string
      default: "localhost"
      description: "Default target host for port scanning"
    port_range:
      type: string
      default: "1-1024"
      description: "Default port range to scan (e.g. 1-1024, 80,443,8080)"
    timeout_ms:
      type: integer
      default: 2000
      description: "Connection timeout per port in milliseconds"
    scan_protocol:
      type: string
      default: "tcp"
      description: "Scan protocol (tcp, udp)"
