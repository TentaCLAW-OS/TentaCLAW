name: "@tentaclaw/japanese"
version: "1.0.0"
type: adapter
title: "Japanese Language Enhancement"
description: "Improves Japanese language generation with proper keigo (honorific) levels, kanji usage, particle accuracy, and natural sentence structure across formal, semi-formal, and casual registers."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories: [language]
tags: [japanese, multilingual, keigo, kanji, translation]
adapter:
  base_model: "llama3.1:8b"
  method: "qlora"
  rank: 16
  alpha: 32
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  training_data: "1.5M Japanese language samples from NHK articles, business correspondence, literary works, and JLPT study materials covering N5 through N1 proficiency levels"
  training_tokens: 14000000
  size_mb: 56
  quality_vs_base: "+28% on Japanese MMLU, +20% on keigo appropriateness benchmarks"
  compatible_models: ["llama3.1:8b", "llama3.1:70b"]
