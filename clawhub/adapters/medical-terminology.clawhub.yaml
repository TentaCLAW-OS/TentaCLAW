name: "@tentaclaw/medical-terminology"
version: "1.0.0"
type: adapter
title: "Medical & Clinical Language"
description: "Fine-tuned on clinical notes, medical literature, and diagnostic language. Improves accuracy of medical terminology, drug interactions, and clinical reasoning patterns."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories: [healthcare]
tags: [medical, clinical, terminology, diagnosis, healthcare]
adapter:
  base_model: "llama3.1:8b"
  method: "qlora"
  rank: 16
  alpha: 32
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  training_data: "600K de-identified clinical notes, 200K PubMed abstracts, and 50K medical textbook passages covering ICD-10, SNOMED-CT, and RxNorm terminologies"
  training_tokens: 15000000
  size_mb: 58
  quality_vs_base: "+25% on medical NER, +19% on clinical reasoning benchmarks"
  compatible_models: ["llama3.1:8b", "llama3.1:70b"]
