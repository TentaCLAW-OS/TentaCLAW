name: "@tentaclaw/tutoring"
version: "1.0.0"
type: adapter
title: "Educational Tutor"
description: "Excels at step-by-step explanations, Socratic questioning, and adaptive difficulty. Breaks complex topics into digestible pieces with analogies, examples, and knowledge checks across STEM and humanities."
license: MIT
author:
  name: TentaCLAW Team
publisher: tentaclaw
categories: [education]
tags: [tutoring, education, explanations, socratic, adaptive-learning]
adapter:
  base_model: "llama3.1:8b"
  method: "qlora"
  rank: 16
  alpha: 32
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  training_data: "600K tutoring session transcripts, Khan Academy-style explanations, textbook worked examples, and Socratic dialogue datasets spanning K-12 through university level"
  training_tokens: 8000000
  size_mb: 50
  quality_vs_base: "+22% on explanation clarity, +18% on student comprehension test improvements"
  compatible_models: ["llama3.1:8b", "llama3.1:70b"]
