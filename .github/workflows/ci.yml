# =============================================================================
# TentaCLAW OS — Continuous Integration
# =============================================================================
# Fast parallel checks: lint, typecheck, test, and build verification.
# Runs on every push to master and on all pull requests.
# =============================================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ESLint across the entire project
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: root-deps-

      - name: Cache gateway node_modules
        uses: actions/cache@v4
        with:
          path: gateway/node_modules
          key: gateway-deps-${{ hashFiles('gateway/package-lock.json') }}
          restore-keys: gateway-deps-

      - name: Cache cli node_modules
        uses: actions/cache@v4
        with:
          path: cli/node_modules
          key: cli-deps-${{ hashFiles('cli/package-lock.json') }}
          restore-keys: cli-deps-

      - name: Cache dashboard node_modules
        uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: dashboard-deps-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: dashboard-deps-

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Typecheck — TypeScript compile check for all packages
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache gateway node_modules
        uses: actions/cache@v4
        with:
          path: gateway/node_modules
          key: gateway-deps-${{ hashFiles('gateway/package-lock.json') }}
          restore-keys: gateway-deps-

      - name: Cache dashboard node_modules
        uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: dashboard-deps-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: dashboard-deps-

      - name: Cache cli node_modules
        uses: actions/cache@v4
        with:
          path: cli/node_modules
          key: cli-deps-${{ hashFiles('cli/package-lock.json') }}
          restore-keys: cli-deps-

      - name: Install gateway dependencies
        run: cd gateway && npm ci

      - name: Install dashboard dependencies
        run: cd dashboard && npm install

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Typecheck gateway
        run: cd gateway && npx tsc --noEmit

      - name: Typecheck dashboard
        run: cd dashboard && npx tsc --noEmit

      - name: Typecheck CLI
        run: cd cli && npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Test — Run gateway tests (Vitest)
  # ---------------------------------------------------------------------------
  test:
    name: Gateway Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache gateway node_modules
        uses: actions/cache@v4
        with:
          path: gateway/node_modules
          key: gateway-deps-${{ hashFiles('gateway/package-lock.json') }}
          restore-keys: gateway-deps-

      - name: Install gateway dependencies
        run: cd gateway && npm install

      - name: Run gateway tests
        id: tests
        run: |
          cd gateway
          npx vitest run --reporter=verbose 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          # Parse test counts from Vitest output
          passing=$(grep -oP 'Tests\s+\K\d+(?=\s+passed)' test-output.txt || echo "0")
          failing=$(grep -oP 'Tests\s+\K\d+(?=\s+failed)' test-output.txt || echo "0")
          total=$((passing + failing))
          test_files=$(grep -oP 'Test Files\s+\K\d+' test-output.txt | head -1 || echo "0")
          echo "passing=$passing" >> "$GITHUB_OUTPUT"
          echo "failing=$failing" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "test_files=$test_files" >> "$GITHUB_OUTPUT"
          exit $exit_code
        env:
          CI: true
        continue-on-error: true

      - name: Report test count in job summary
        run: |
          echo "## Gateway Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passing | ${{ steps.tests.outputs.passing }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failing | ${{ steps.tests.outputs.failing }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total | ${{ steps.tests.outputs.total }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Files | ${{ steps.tests.outputs.test_files }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Build Dashboard — Build the React dashboard
  # ---------------------------------------------------------------------------
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dashboard node_modules
        uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: dashboard-deps-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: dashboard-deps-

      - name: Install dashboard dependencies
        run: cd dashboard && npm install

      - name: Build dashboard
        run: cd dashboard && npm run build

  # ---------------------------------------------------------------------------
  # Build CLI — Compile the CLI with TypeScript
  # ---------------------------------------------------------------------------
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache cli node_modules
        uses: actions/cache@v4
        with:
          path: cli/node_modules
          key: cli-deps-${{ hashFiles('cli/package-lock.json') }}
          restore-keys: cli-deps-

      - name: Install CLI dependencies
        run: cd cli && npm ci

      - name: Build CLI
        run: cd cli && npx tsc

  # ---------------------------------------------------------------------------
  # Security Scan — Dependency audit + Trivy container scan (Wave 4)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install gateway dependencies
        run: cd gateway && npm ci

      - name: npm audit (gateway)
        run: cd gateway && npm audit --audit-level=high || true

      - name: npm audit (cli)
        run: cd cli && npm ci && npm audit --audit-level=high || true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          format: 'table'

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: 'p/javascript p/typescript p/nodejs'
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
