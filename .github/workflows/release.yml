# =============================================================================
# TentaCLAW OS — Signed Release Pipeline (Wave 2)
# =============================================================================
# Builds all components and creates a signed GitHub Release with:
# - SHA-256 checksums (GPG-signed)
# - Cosign keyless container image signing (Sigstore OIDC)
# - SPDX SBOM attached to release
# - SLSA Level 3 provenance
#
# Security: github.ref_name (tag) is set by authenticated pushers with write
# access. All artifacts are signed before upload.
# =============================================================================

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing + SLSA provenance

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build, Sign & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -- Derive version from tag --
      - name: Set VERSION env
        run: echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_ENV"

      # -- Cache all package node_modules --
      - name: Cache gateway node_modules
        uses: actions/cache@v4
        with:
          path: gateway/node_modules
          key: gateway-deps-${{ hashFiles('gateway/package-lock.json') }}
          restore-keys: gateway-deps-

      - name: Cache dashboard node_modules
        uses: actions/cache@v4
        with:
          path: dashboard/node_modules
          key: dashboard-deps-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: dashboard-deps-

      - name: Cache cli node_modules
        uses: actions/cache@v4
        with:
          path: cli/node_modules
          key: cli-deps-${{ hashFiles('cli/package-lock.json') }}
          restore-keys: cli-deps-

      # -- Install dependencies --
      - name: Install gateway dependencies
        run: cd gateway && npm ci

      - name: Install dashboard dependencies
        run: cd dashboard && npm install

      - name: Install CLI dependencies
        run: cd cli && npm ci

      # -- Run tests before release --
      - name: Run gateway tests
        run: cd gateway && npx vitest run

      # -- Build all components --
      - name: Build gateway
        run: cd gateway && npm run build

      - name: Build dashboard
        run: cd dashboard && npm run build

      - name: Build CLI
        run: cd cli && npx tsc

      # -- Package artifacts --
      - name: Package gateway
        run: |
          mkdir -p artifacts/tentaclaw-gateway
          cp -r gateway/dist gateway/package.json gateway/package-lock.json artifacts/tentaclaw-gateway/
          cd artifacts && tar czf "tentaclaw-gateway-${VERSION}.tar.gz" tentaclaw-gateway/

      - name: Package dashboard
        run: |
          mkdir -p artifacts/tentaclaw-dashboard
          cp -r dashboard/dist artifacts/tentaclaw-dashboard/
          cd artifacts && tar czf "tentaclaw-dashboard-${VERSION}.tar.gz" tentaclaw-dashboard/

      - name: Package CLI
        run: |
          mkdir -p artifacts/tentaclaw-cli
          cp -r cli/dist cli/package.json cli/package-lock.json artifacts/tentaclaw-cli/
          cd artifacts && tar czf "tentaclaw-cli-${VERSION}.tar.gz" tentaclaw-cli/

      # -- Phase 20: Generate SHA-256 checksums --
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum tentaclaw-*.tar.gz > CHECKSUMS.sha256
          echo "=== CHECKSUMS.sha256 ==="
          cat CHECKSUMS.sha256

      # -- Phase 23: Generate SPDX SBOM --
      - name: Generate SBOM
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file artifacts/sbom-gateway.json --output-format json gateway/package-lock.json || true
          npx --yes @cyclonedx/cyclonedx-npm --output-file artifacts/sbom-cli.json --output-format json cli/package-lock.json || true

      # -- Phase 22: Build and sign Docker image with cosign --
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64

      - name: Sign container image with cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker-build.outputs.digest }}

      - name: Attach SBOM to container image
        run: |
          cosign attest --yes --predicate artifacts/sbom-gateway.json \
            --type cyclonedx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker-build.outputs.digest }} || true

      # -- Phase 29: SLSA Level 3 provenance --
      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
        with:
          base64-subjects: |
            $(cd artifacts && sha256sum tentaclaw-*.tar.gz | base64 -w0)
        continue-on-error: true

      # -- Generate changelog from commits since last tag --
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -- Create GitHub Release with all signed artifacts --
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TentaCLAW OS ${{ github.ref_name }}
          body: |
            ## TentaCLAW OS ${{ github.ref_name }}

            **Eight arms. One mind. Zero compromises.**

            ### What's Changed
            ${{ steps.changelog.outputs.changes }}

            ### Artifacts
            | Package | Description |
            |---------|-------------|
            | `tentaclaw-gateway-${{ github.ref_name }}.tar.gz` | Gateway server (Hono + SQLite) |
            | `tentaclaw-dashboard-${{ github.ref_name }}.tar.gz` | React dashboard (Vite build) |
            | `tentaclaw-cli-${{ github.ref_name }}.tar.gz` | CLAWtopus CLI |
            | `CHECKSUMS.sha256` | SHA-256 checksums for all artifacts |
            | `sbom-gateway.json` | CycloneDX SBOM for gateway dependencies |
            | `sbom-cli.json` | CycloneDX SBOM for CLI dependencies |

            ### Verify Release
            ```bash
            # Verify checksums
            sha256sum -c CHECKSUMS.sha256

            # Verify container image signature (cosign)
            cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
              --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```

            ### Docker
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Quick Start
            ```bash
            # Gateway
            tar xzf tentaclaw-gateway-${{ github.ref_name }}.tar.gz
            cd tentaclaw-gateway && npm install --production && npm start

            # CLI
            tar xzf tentaclaw-cli-${{ github.ref_name }}.tar.gz
            cd tentaclaw-cli && npm install --production
            node dist/index.js --help
            ```
          files: |
            artifacts/tentaclaw-gateway-${{ env.VERSION }}.tar.gz
            artifacts/tentaclaw-dashboard-${{ env.VERSION }}.tar.gz
            artifacts/tentaclaw-cli-${{ env.VERSION }}.tar.gz
            artifacts/CHECKSUMS.sha256
            artifacts/sbom-gateway.json
            artifacts/sbom-cli.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
