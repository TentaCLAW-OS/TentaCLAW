# TentaCLAW Prometheus Configuration
# Scrapes the gateway's /metrics endpoint for cluster observability.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tentaclaw
    static_configs:
      - targets: ['gateway:8080']
    scrape_interval: 15s
    metrics_path: /metrics
